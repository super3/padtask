<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232563eb' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='20 6 9 17 4 12'></polyline></svg>">
    <title>PadTask</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script
        async
        crossorigin="anonymous"
        data-clerk-publishable-key="pk_test_bGVhcm5pbmctc3BpZGVyLTU3LmNsZXJrLmFjY291bnRzLmRldiQ"
        src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
        type="text/javascript"
    ></script>
    <style>
        :root {
            --bg-base: #09090b;
            --bg-panel: #0c0c0f;
            --bg-panel-alt: #101014;
            --bg-raised: #16161c;
            --bg-hover: #1c1c24;
            --bg-active: #23232d;
            --border-subtle: #1e1e26;
            --border-default: #27272f;
            --border-strong: #33333d;
            --text-muted: #5a5a66;
            --text-soft: #8a8a96;
            --text-default: #c9c9d1;
            --text-strong: #f4f4f7;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --accent-soft: rgba(99, 102, 241, 0.12);
            --accent-glow: rgba(99, 102, 241, 0.18);
            --success: #22c55e;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-base);
            color: var(--text-default);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            display: grid;
            grid-template-columns: auto 1fr 1fr;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 56px;
            background: var(--bg-base);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            padding: 0 8px 12px;
            transition: width 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            position: relative;
        }

        .sidebar-header {
            height: 64px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-subtle);
            margin: 0 -8px;
            padding: 0 8px;
            margin-bottom: 12px;
        }

        .sidebar.expanded {
            width: 220px;
        }

        .sidebar-btn {
            width: 40px;
            height: 40px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: background 0.15s ease, color 0.15s ease;
            flex-shrink: 0;
        }

        .sidebar.expanded .sidebar-btn {
            width: 100%;
            justify-content: flex-start;
            padding: 0 12px;
        }

        .sidebar-btn:hover {
            background: var(--bg-hover);
            color: var(--text-soft);
        }

        .sidebar-btn:active {
            transform: scale(0.97);
        }

        .sidebar-btn span {
            display: none;
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--text-soft);
        }

        .sidebar.expanded .sidebar-btn span {
            display: inline;
        }

        .sidebar-brand {
            width: 32px;
            height: 32px;
            border-radius: 9px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.12);
        }

        .sidebar-brand svg {
            color: #fff;
        }

        #sidebarToggle {
            width: 100%;
            justify-content: flex-start;
            padding: 0 4px;
            gap: 10px;
        }

        .sidebar-header .sidebar-btn span {
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--text-strong);
            letter-spacing: -0.01em;
            text-transform: none;
        }

        #newChatBtn {
            border: 1px solid var(--border-subtle);
            background: var(--bg-panel-alt);
            color: var(--text-soft);
        }

        #newChatBtn:hover {
            background: var(--bg-hover);
            border-color: var(--border-default);
            color: var(--text-default);
        }

        .sidebar.expanded #newChatBtn span {
            font-weight: 500;
            color: var(--text-default);
        }

        .chat-list-label {
            font-size: 0.6875rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 20px 12px 8px;
        }

        .sidebar:not(.expanded) .chat-list-label {
            display: none;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .sidebar:not(.expanded) .chat-list {
            overflow: hidden;
        }

        .chat-item {
            width: 100%;
            height: 34px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 8px;
            padding: 0 10px;
            transition: background 0.15s ease, color 0.15s ease;
            text-align: left;
            font-size: 0.8125rem;
            display: flex;
            align-items: center;
            position: relative;
        }

        .sidebar:not(.expanded) .chat-item {
            display: none;
        }

        .chat-item:hover {
            background: var(--bg-hover);
            color: var(--text-soft);
        }

        .chat-item.active {
            background: var(--bg-active);
            color: var(--text-strong);
            font-weight: 500;
        }

        .chat-item-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        .chat-item-menu-btn {
            display: none;
            width: 24px;
            height: 24px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 6px;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-left: 4px;
            margin-right: -4px;
            transition: background 0.15s ease, color 0.15s ease;
        }

        .chat-item:hover .chat-item-menu-btn,
        .chat-item.active .chat-item-menu-btn {
            display: flex;
        }

        .chat-item-menu-btn:hover {
            background: var(--bg-active);
            color: var(--text-default);
        }

        .chat-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: calc(100% + 4px);
            background: var(--bg-raised);
            border: 1px solid var(--border-default);
            border-radius: 10px;
            padding: 4px;
            min-width: 140px;
            z-index: 100;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5), 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .chat-dropdown.show {
            display: block;
            animation: dropdownIn 0.12s ease-out;
        }

        @keyframes dropdownIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-dropdown-item {
            width: 100%;
            padding: 8px 12px;
            background: transparent;
            border: none;
            color: var(--text-soft);
            cursor: pointer;
            border-radius: 6px;
            text-align: left;
            font-size: 0.8125rem;
            display: block;
            transition: background 0.1s ease, color 0.1s ease;
        }

        .chat-dropdown-item:hover {
            background: var(--bg-active);
            color: var(--text-strong);
        }

        .chat-dropdown-item.danger:hover {
            background: rgba(239, 68, 68, 0.12);
            color: #f87171;
        }

        .sidebar-bottom {
            position: absolute;
            bottom: 20px;
            left: 8px;
            right: 8px;
            padding-top: 12px;
            border-top: 1px solid var(--border-subtle);
        }

        .user-btn {
            width: 40px;
            height: 40px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: background 0.15s ease, color 0.15s ease;
        }

        .sidebar.expanded .user-btn {
            width: 100%;
            justify-content: flex-start;
            padding: 0 12px;
        }

        .user-btn:hover {
            background: var(--bg-hover);
            color: var(--text-soft);
        }

        .user-btn span {
            display: none;
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--text-soft);
        }

        .sidebar.expanded .user-btn span {
            display: inline;
        }


        .clerk-profile {
            display: none;
            align-items: center;
            gap: 12px;
            width: 40px;
            height: 40px;
        }

        .clerk-profile.visible {
            display: flex;
        }

        .sidebar.expanded .clerk-profile {
            width: 100%;
            padding: 0 8px;
        }

        .clerk-profile-name {
            display: none;
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--text-soft);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            transition: color 0.15s ease;
        }

        .clerk-profile-name:hover {
            color: var(--text-strong);
        }

        .sidebar.expanded .clerk-profile-name {
            display: inline;
        }

        /* Shared Panel Styles */
        .panel {
            display: grid;
            grid-template-rows: 64px 1fr auto;
            height: 100vh;
            overflow: hidden;
        }

        .panel-header {
            height: 64px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-subtle);
            background: var(--bg-panel);
            backdrop-filter: blur(8px);
        }

        .panel-header h1,
        .panel-header h2 {
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--text-strong);
            letter-spacing: -0.01em;
            text-transform: none;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 320px;
        }

        .panel-header .subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 400;
            text-transform: none;
            letter-spacing: 0;
        }

        .model-badge {
            font-size: 0.6875rem;
            font-weight: 500;
            color: var(--text-soft);
            background: var(--bg-raised);
            padding: 5px 10px 5px 20px;
            border-radius: 20px;
            border: 1px solid var(--border-default);
            white-space: nowrap;
            position: relative;
            letter-spacing: 0.01em;
        }

        .model-badge::before {
            content: '';
            position: absolute;
            left: 9px;
            top: 50%;
            transform: translateY(-50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
        }

        /* Chat Panel */
        .chat-panel {
            border-right: 1px solid var(--border-subtle);
            background: var(--bg-base);
        }

        .messages {
            overflow-y: auto;
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
        }

        .message {
            padding: 4px 0;
            line-height: 1.65;
            font-size: 0.9375rem;
            animation: messageIn 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes messageIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--bg-raised), var(--bg-panel-alt));
            border: 1px solid var(--border-default);
            color: var(--text-default);
            padding: 12px 16px;
            border-radius: 18px;
            border-bottom-right-radius: 6px;
            max-width: 88%;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .message.assistant {
            color: var(--text-default);
            max-width: 92%;
            position: relative;
            padding-left: 40px;
        }

        .message.assistant::before {
            content: '';
            position: absolute;
            left: 0;
            top: 2px;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            box-shadow: 0 2px 6px rgba(99, 102, 241, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.12);
        }

        .message.assistant::after {
            content: '';
            position: absolute;
            left: 7px;
            top: 9px;
            width: 14px;
            height: 14px;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='20 6 9 17 4 12'/></svg>");
            background-size: contain;
            background-repeat: no-repeat;
        }

        .message .quoted-task {
            border-left: 3px solid var(--accent);
            padding: 6px 12px;
            margin-bottom: 10px;
            color: var(--text-soft);
            font-size: 0.8125rem;
            background: var(--accent-soft);
            border-radius: 0 8px 8px 0;
        }

        /* Quote reply preview */
        .quote-preview {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 10px 10px 0 10px;
        }

        .quote-preview.active {
            display: flex;
            animation: messageIn 0.2s ease-out;
        }

        .quote-preview-bar {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--accent-soft);
            border-left: 3px solid var(--accent);
            border-radius: 8px;
            padding: 8px 12px;
            min-width: 0;
        }

        .quote-preview-label {
            color: var(--accent-hover);
            font-size: 0.6875rem;
            font-weight: 600;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .quote-preview-text {
            color: var(--text-default);
            font-size: 0.8125rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        .quote-preview-dismiss {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s ease, color 0.15s ease;
        }

        .quote-preview-dismiss:hover {
            background: var(--bg-active);
            color: var(--text-default);
        }

        /* Todo item quote affordance */
        .todo-content li {
            cursor: pointer;
        }

        .todo-content li.quote-active {
            border-color: var(--accent) !important;
            background: var(--accent-soft) !important;
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .chat-input-container {
            padding: 16px 24px 24px;
            background: var(--bg-base);
        }

        .chat-input-wrapper {
            display: flex;
            flex-direction: column;
            background: var(--bg-panel-alt);
            border: 1px solid var(--border-default);
            border-radius: 16px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            overflow: hidden;
        }

        .chat-input-row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            padding: 6px 6px 6px 18px;
        }

        .chat-input-wrapper:focus-within {
            border-color: var(--accent);
            background: var(--bg-raised);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .chat-input {
            flex: 1;
            padding: 12px 0;
            border: none;
            background: transparent;
            color: var(--text-strong);
            font-size: 0.9375rem;
            font-family: inherit;
            resize: none;
            min-height: 24px;
            max-height: 120px;
            outline: none;
            line-height: 1.5;
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 36px;
            height: 36px;
            background: var(--bg-hover);
            color: var(--text-muted);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.15s ease, color 0.15s ease, transform 0.1s ease, box-shadow 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-bottom: 2px;
        }

        .chat-input-wrapper:focus-within .send-btn,
        .send-btn.active {
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: #fff;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.35);
        }

        .send-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--accent-hover), #a78bfa);
            color: #fff;
            box-shadow: 0 2px 10px rgba(99, 102, 241, 0.4);
        }

        .send-btn:active:not(:disabled) {
            transform: scale(0.94);
        }

        .send-btn:disabled {
            background: var(--bg-hover);
            color: var(--border-strong);
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Todo Panel */
        .todo-panel {
            background: var(--bg-panel);
            position: relative;
        }

        .todo-panel .panel-header {
            background: var(--bg-panel);
        }

        .todo-progress {
            position: absolute;
            top: 63px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--border-subtle);
            z-index: 5;
            overflow: hidden;
        }

        .todo-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #8b5cf6);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .todo-header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .copy-tasks-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: background 0.15s ease, color 0.15s ease;
        }

        .copy-tasks-btn:hover {
            background: var(--bg-hover);
            color: var(--text-default);
        }

        .copy-tasks-btn.copied {
            color: var(--success);
            background: rgba(34, 197, 94, 0.1);
        }

        .todo-stats {
            font-size: 0.6875rem;
            font-weight: 500;
            color: var(--text-soft);
            background: var(--bg-raised);
            padding: 5px 10px;
            border-radius: 20px;
            border: 1px solid var(--border-default);
            letter-spacing: 0.01em;
        }

        .todo-content {
            overflow-y: auto;
            padding: 24px;
        }

        /* Markdown Rendered Styles */
        .todo-content h1, .todo-content h2, .todo-content h3 {
            color: var(--text-soft);
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 12px;
            margin-top: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            user-select: none;
            transition: color 0.15s ease;
        }

        .todo-content h1::before, .todo-content h2::before, .todo-content h3::before {
            content: '';
            display: inline-block;
            width: 0;
            height: 0;
            border-left: 5px solid currentColor;
            border-top: 4px solid transparent;
            border-bottom: 4px solid transparent;
            transition: transform 0.2s ease;
            transform: rotate(90deg);
            opacity: 0.6;
        }

        .todo-content h1.collapsed::before,
        .todo-content h2.collapsed::before,
        .todo-content h3.collapsed::before {
            transform: rotate(0deg);
        }

        .todo-content h1.collapsed + ul,
        .todo-content h2.collapsed + ul,
        .todo-content h3.collapsed + ul {
            display: none;
        }

        .todo-content h1:hover, .todo-content h2:hover, .todo-content h3:hover {
            color: var(--text-default);
        }

        .todo-content h1:first-child,
        .todo-content h2:first-child,
        .todo-content h3:first-child {
            margin-top: 0;
        }

        .todo-content ul {
            list-style: none;
            padding-left: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .todo-content li {
            padding: 14px 16px;
            background: var(--bg-raised);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
            user-select: text;
            position: relative;
        }

        .todo-content li:hover {
            background: var(--bg-hover);
            border-color: var(--border-default);
            transform: translateX(2px);
        }

        .todo-content input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border: 1.5px solid var(--border-strong);
            border-radius: 6px;
            cursor: pointer;
            transition: border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
            position: relative;
            flex-shrink: 0;
            background: transparent;
        }

        .todo-content input[type="checkbox"]:hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .todo-content input[type="checkbox"]:checked {
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-color: transparent;
            box-shadow: 0 2px 6px rgba(99, 102, 241, 0.3);
        }

        .todo-content input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 5px;
            top: 1px;
            width: 6px;
            height: 11px;
            border: solid #fff;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .todo-content li.checked {
            opacity: 0.55;
            background: var(--bg-panel-alt);
        }

        .todo-content li.checked span {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .todo-content li.checked:hover {
            opacity: 0.8;
        }

        .todo-content a {
            color: var(--accent-hover);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: color 0.15s ease, border-color 0.15s ease;
        }

        .todo-content a:hover {
            color: #a5b4fc;
            border-bottom-color: currentColor;
        }

        .todo-content li.checked a {
            color: var(--text-muted);
        }

        .todo-content p {
            color: var(--text-muted);
            margin-bottom: 16px;
            font-size: 0.875rem;
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 360px;
            color: var(--text-muted);
            text-align: center;
            padding: 48px;
        }

        .empty-state-icon {
            width: 72px;
            height: 72px;
            margin-bottom: 24px;
            border-radius: 20px;
            background: var(--bg-raised);
            border: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            position: relative;
        }

        .empty-state-icon::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(135deg, var(--accent-glow), transparent 60%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .empty-state h3 {
            color: var(--text-default);
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.9375rem;
            letter-spacing: -0.01em;
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: 0.8125rem;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: transparent;
            border-radius: 4px;
            border: 2px solid transparent;
            background-clip: padding-box;
        }

        *:hover > ::-webkit-scrollbar-thumb,
        .messages:hover::-webkit-scrollbar-thumb,
        .todo-content:hover::-webkit-scrollbar-thumb,
        .chat-list:hover::-webkit-scrollbar-thumb {
            background: var(--border-default);
            background-clip: padding-box;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--border-strong) !important;
            background-clip: padding-box !important;
        }

        /* Loading indicator */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 8px 0;
            align-self: flex-start;
            padding-left: 40px;
            position: relative;
        }

        .typing-indicator::before {
            content: '';
            position: absolute;
            left: 0;
            top: 2px;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            box-shadow: 0 2px 6px rgba(99, 102, 241, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.12);
            opacity: 0.6;
        }

        .typing-indicator span {
            width: 7px;
            height: 7px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }

            .todo-panel {
                display: none;
            }

            .chat-panel {
                border-right: none;
            }

            .sidebar {
                width: 0;
                padding: 0;
                border: none;
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
            }

            .sidebar.expanded {
                width: 240px;
                padding: 0 8px 12px;
                border-right: 1px solid var(--border-subtle);
                z-index: 100;
                box-shadow: 12px 0 32px rgba(0, 0, 0, 0.4);
            }

            .sidebar-bottom {
                bottom: 24px;
            }

            .mobile-toggle {
                display: flex;
            }
        }

        .mobile-toggle {
            display: none;
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 99;
            width: 40px;
            height: 40px;
            background: var(--bg-raised);
            border: 1px solid var(--border-default);
            color: var(--text-soft);
            cursor: pointer;
            border-radius: 10px;
            align-items: center;
            justify-content: center;
            transition: background 0.15s ease, color 0.15s ease;
        }

        .mobile-toggle:hover {
            background: var(--bg-hover);
            color: var(--text-strong);
        }
    </style>
</head>
<body>
    <button class="mobile-toggle" id="mobileToggle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </button>

    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="sidebar-btn" id="sidebarToggle" title="PadTask">
                    <span class="sidebar-brand">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </span>
                    <span>PadTask</span>
                </button>
            </div>

            <button class="sidebar-btn" id="newChatBtn" title="New chat">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <span>New Chat</span>
            </button>

            <div class="chat-list-label">Chats</div>
            <div class="chat-list" id="chatList">
                <!-- Chat items will be dynamically added here -->
            </div>

            <div class="sidebar-bottom">
                <div class="clerk-profile" id="clerkProfile">
                    <div id="clerkUserButton"></div>
                    <span class="clerk-profile-name" id="clerkProfileName"></span>
                </div>
                <button class="user-btn" id="userBtn" title="Account">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="8" r="4"></circle>
                        <path d="M20 21a8 8 0 1 0-16 0"></path>
                    </svg>
                    <span>Sign in</span>
                </button>
            </div>
        </div>

        <!-- Chat Panel -->
        <div class="chat-panel panel">
            <div class="panel-header">
                <h1 id="chatPanelTitle">Chat</h1>
                <span class="model-badge" id="modelBadge">Claude Sonnet 4.6</span>
            </div>
            <div class="messages" id="messages">
                <div class="message assistant">
                    Hey! Tell me what you need to get done and I'll organize it for you.
                </div>
            </div>
            <div class="chat-input-container">
                <div class="chat-input-wrapper">
                    <div class="quote-preview" id="quotePreview">
                        <div class="quote-preview-bar">
                            <span class="quote-preview-label">Task</span>
                            <span class="quote-preview-text" id="quotePreviewText"></span>
                        </div>
                        <button class="quote-preview-dismiss" id="quotePreviewDismiss" title="Remove quote">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </div>
                    <div class="chat-input-row">
                        <textarea
                            class="chat-input"
                            id="chatInput"
                            placeholder="I need to..."
                            rows="1"
                        ></textarea>
                        <button class="send-btn" id="sendBtn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="19" x2="12" y2="5"></line>
                                <polyline points="5 12 12 5 19 12"></polyline>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Todo Panel -->
        <div class="todo-panel panel">
            <div class="panel-header">
                <h2>Tasks</h2>
                <div class="todo-header-actions">
                    <button class="copy-tasks-btn" id="copyTasksBtn" title="Copy tasks as markdown" onclick="copyTasksMarkdown()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                    </button>
                    <span class="todo-stats" id="todoStats">0 tasks</span>
                </div>
            </div>
            <div class="todo-progress"><div class="todo-progress-bar" id="todoProgressBar"></div></div>
            <div class="todo-content" id="todoContent">
                <div class="empty-state">
                    <div class="empty-state-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 11l3 3L22 4"></path>
                            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                        </svg>
                    </div>
                    <h3>No tasks yet</h3>
                    <p>Start chatting to add tasks</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State
        let todoMarkdown = '';
        let conversationHistory = [];
        let currentSessionId = null;
        let chats = []; // Array of { id, name, todoMarkdown }
        let quotedTask = null; // Text of the currently quoted task

        // DOM Elements
        const messagesContainer = document.getElementById('messages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const todoContent = document.getElementById('todoContent');
        const todoStats = document.getElementById('todoStats');
        const chatList = document.getElementById('chatList');
        const chatPanelTitle = document.getElementById('chatPanelTitle');
        const modelBadge = document.getElementById('modelBadge');
        const quotePreview = document.getElementById('quotePreview');
        const quotePreviewText = document.getElementById('quotePreviewText');
        const quotePreviewDismiss = document.getElementById('quotePreviewDismiss');
        const todoProgressBar = document.getElementById('todoProgressBar');

        async function copyTasksMarkdown() {
            if (!todoMarkdown) return;
            try {
                await navigator.clipboard.writeText(todoMarkdown);
                const btn = document.getElementById('copyTasksBtn');
                btn.classList.add('copied');
                btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
                }, 2000);
            } catch (err) {
                console.error('Failed to copy tasks:', err);
            }
        }

        function formatModelName(modelId) {
            if (!modelId) return 'Claude Sonnet 4.6';
            if (modelId.includes('sonnet')) return 'Claude Sonnet 4.6';
            return modelId;
        }
        const newChatBtn = document.getElementById('newChatBtn');
        const userBtn = document.getElementById('userBtn');
        const clerkUserButtonDiv = document.getElementById('clerkUserButton');
        const clerkProfile = document.getElementById('clerkProfile');
        const clerkProfileName = document.getElementById('clerkProfileName');

        clerkProfileName.addEventListener('click', () => {
            const btn = clerkUserButtonDiv.querySelector('button');
            if (btn) btn.click();
        });

        // Clerk Authentication (frontend-only, optional)
        function waitForClerk(timeout = 5000) {
            return new Promise((resolve) => {
                if (window.Clerk) return resolve(window.Clerk);
                const start = Date.now();
                const interval = setInterval(() => {
                    if (window.Clerk) {
                        clearInterval(interval);
                        resolve(window.Clerk);
                    } else if (Date.now() - start > timeout) {
                        clearInterval(interval);
                        resolve(null);
                    }
                }, 100);
            });
        }

        async function initClerk() {
            const clerk = await waitForClerk();
            if (!clerk) {
                console.warn('Clerk failed to load');
                return;
            }

            await clerk.load();

            if (clerk.user) {
                showClerkButton();
            }

            clerk.addListener(({ user }) => {
                if (user) {
                    showClerkButton();
                } else {
                    hideClerkButton();
                }
            });
        }

        function showClerkButton() {
            const user = window.Clerk.user;
            const name = user.firstName || user.emailAddresses?.[0]?.emailAddress || 'Account';
            clerkProfileName.textContent = name;

            window.Clerk.mountUserButton(clerkUserButtonDiv, {
                afterSignOutUrl: window.location.href,
                appearance: {
                    elements: {
                        avatarBox: { width: '28px', height: '28px', borderRadius: '6px' },
                        userButtonAvatarBox: { width: '28px', height: '28px', borderRadius: '6px' },
                        avatarImage: { borderRadius: '6px' },
                        userButtonTrigger: {
                            borderRadius: '8px',
                            padding: '4px'
                        },
                        userButtonOuterIdentifier: { display: 'none' }
                    }
                }
            });
            // Wait for Clerk to actually render before swapping
            const poll = setInterval(() => {
                if (clerkUserButtonDiv.querySelector('button')) {
                    userBtn.style.display = 'none';
                    clerkProfile.classList.add('visible');
                    clearInterval(poll);
                }
            }, 50);
        }

        function hideClerkButton() {
            userBtn.style.display = 'flex';
            clerkProfile.classList.remove('visible');
            window.Clerk.unmountUserButton(clerkUserButtonDiv);
        }

        // Sign in button click
        userBtn.addEventListener('click', async () => {
            const clerk = await waitForClerk();
            if (!clerk) return;
            if (!clerk.loaded) await clerk.load();
            await clerk.openSignIn({
                fallbackRedirectUrl: window.location.href
            });
        });

        // Initialize Clerk
        initClerk();

        // Auto-resize textarea and toggle send button active state
        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
            if (this.value.trim() || quotedTask) {
                sendBtn.classList.add('active');
            } else {
                sendBtn.classList.remove('active');
            }
        });

        // Send on Enter (Shift+Enter for new line)
        chatInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        // Quote task functions
        function setQuotedTask(taskText) {
            quotedTask = taskText;
            quotePreviewText.textContent = taskText;
            quotePreview.classList.add('active');
            sendBtn.classList.add('active');
            chatInput.focus();
        }

        function clearQuotedTask() {
            quotedTask = null;
            quotePreviewText.textContent = '';
            quotePreview.classList.remove('active');
            if (!chatInput.value.trim()) {
                sendBtn.classList.remove('active');
            }
        }

        quotePreviewDismiss.addEventListener('click', clearQuotedTask);

        function addMessage(content, role) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            // Check if the message starts with a quote ("> text\n\n")
            const quoteMatch = content.match(/^> (.+?)\n\n([\s\S]*)$/);
            if (quoteMatch) {
                const quoteDiv = document.createElement('div');
                quoteDiv.className = 'quoted-task';
                quoteDiv.textContent = quoteMatch[1];
                messageDiv.appendChild(quoteDiv);
                const bodyText = document.createTextNode(quoteMatch[2]);
                messageDiv.appendChild(bodyText);
            } else {
                messageDiv.textContent = content;
            }

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.id = 'typingIndicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';
            messagesContainer.appendChild(indicator);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function updateTodoDisplay() {
            if (!todoMarkdown.trim()) {
                todoContent.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M9 11l3 3L22 4"></path>
                                <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                            </svg>
                        </div>
                        <h3>No tasks yet</h3>
                        <p>Start chatting to add tasks</p>
                    </div>
                `;
                todoStats.textContent = '0 tasks';
                if (todoProgressBar) todoProgressBar.style.width = '0%';
                return;
            }

            // Parse markdown and render
            const renderer = new marked.Renderer();
            renderer.link = function(token) {
                return `<a href="${token.href}" target="_blank" rel="noopener noreferrer">${token.text}</a>`;
            };
            let html = marked.parse(todoMarkdown, { renderer });
            todoContent.innerHTML = html;

            // Wrap text after checkbox in a span so links don't become separate flex items
            todoContent.querySelectorAll('li').forEach(li => {
                const checkbox = li.querySelector('input[type="checkbox"]');
                if (checkbox) {
                    const span = document.createElement('span');
                    while (checkbox.nextSibling) {
                        span.appendChild(checkbox.nextSibling);
                    }
                    li.appendChild(span);
                }
            });

            // Make category headings collapsible
            todoContent.querySelectorAll('h1, h2, h3').forEach(heading => {
                const key = 'padtask-collapsed-' + heading.textContent.trim();
                if (localStorage.getItem(key) === 'true') {
                    heading.classList.add('collapsed');
                }
                heading.addEventListener('click', () => {
                    heading.classList.toggle('collapsed');
                    const isCollapsed = heading.classList.contains('collapsed');
                    localStorage.setItem(key, isCollapsed);
                });
            });

            // Enable checkboxes (marked GFM creates them as disabled)
            todoContent.querySelectorAll('input[type="checkbox"]').forEach((checkbox, index) => {
                checkbox.removeAttribute('disabled');

                // Add checked class to parent li
                if (checkbox.checked) {
                    checkbox.closest('li').classList.add('checked');
                }

                // Handle checkbox clicks
                checkbox.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleTodo(index);
                });

                // Click-to-quote on li
                const li = checkbox.closest('li');
                if (li) {
                    li.addEventListener('click', (e) => {
                        // Don't quote when clicking the checkbox
                        if (e.target.tagName === 'INPUT') return;
                        // Get the task text from li's children, skipping the
                        // checkbox. The task text lives inside the wrapper
                        // span added above (or directly as text nodes if no
                        // wrapper exists).
                        let text = '';
                        li.childNodes.forEach(node => {
                            if (node.nodeType === Node.TEXT_NODE) {
                                text += node.textContent;
                            } else if (
                                node.nodeType === Node.ELEMENT_NODE &&
                                node.tagName !== 'INPUT'
                            ) {
                                text += node.textContent;
                            }
                        });
                        text = text.trim();
                        if (text) {
                            // Briefly highlight the item
                            li.classList.add('quote-active');
                            setTimeout(() => li.classList.remove('quote-active'), 300);
                            setQuotedTask(text);
                        }
                    });
                }
            });

            // Update stats
            const total = (todoMarkdown.match(/- \[[ x]\]/gi) || []).length;
            const completed = (todoMarkdown.match(/- \[x\]/gi) || []).length;
            todoStats.textContent = total > 0 ? `${completed}/${total} completed` : '0 tasks';
            if (todoProgressBar) {
                const pct = total > 0 ? (completed / total) * 100 : 0;
                todoProgressBar.style.width = pct + '%';
            }
        }

        function toggleTodo(index) {
            // Find and toggle the checkbox in markdown
            let count = 0;
            todoMarkdown = todoMarkdown.replace(/- \[[ x]\]/gi, (match) => {
                if (count === index) {
                    count++;
                    return match.toLowerCase() === '- [x]' ? '- [ ]' : '- [x]';
                }
                count++;
                return match;
            });
            updateTodoDisplay();
            const chat = chats.find(c => c.id === currentSessionId);
            if (chat) {
                chat.todoMarkdown = todoMarkdown;
                saveChats();
            }
        }

        // API base URL - use Railway in production, relative URL in development
        const API_BASE = window.location.hostname === 'localhost'
            ? ''
            : 'https://padtask-production.up.railway.app';

        // Chat management functions
        function generateSessionId() {
            return Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        }

        function getChatIdFromUrl() {
            const hash = window.location.hash;
            const match = hash.match(/^#\/chat\/(.+)$/);
            if (!match) return null;
            // Strip "session-" prefix from old bookmarked URLs
            const id = match[1];
            return id.startsWith('session-') ? id.slice('session-'.length) : id;
        }

        function updateUrl(chatId) {
            history.replaceState(null, '', `#/chat/${chatId}`);
        }

        function loadChats() {
            const saved = localStorage.getItem('padtask-chats');
            if (saved) {
                chats = JSON.parse(saved);
                // Migrate: strip "session-" prefix from existing chat IDs
                let migrated = false;
                chats.forEach(chat => {
                    if (chat.id && chat.id.startsWith('session-')) {
                        chat.id = chat.id.slice('session-'.length);
                        migrated = true;
                    }
                });
                if (migrated) {
                    localStorage.setItem('padtask-chats', JSON.stringify(chats));
                }
            }
            if (chats.length === 0) {
                createNewChat();
            } else {
                // Check URL for a specific chat to load
                const urlChatId = getChatIdFromUrl();
                const chat = (urlChatId && chats.find(c => c.id === urlChatId)) || chats[0];
                currentSessionId = chat.id;
                todoMarkdown = chat.todoMarkdown || '';
                conversationHistory = chat.messages || [];
                loadChatUI(chat);
                updateUrl(chat.id);
            }
            renderChatList();
        }

        function saveChats() {
            localStorage.setItem('padtask-chats', JSON.stringify(chats));
        }

        function createNewChat() {
            const newId = generateSessionId();
            const chatNumber = chats.length + 1;
            const newChat = {
                id: newId,
                name: `Chat ${chatNumber}`,
                todoMarkdown: '',
                messages: []
            };
            chats.unshift(newChat); // Add to beginning
            currentSessionId = newId;
            todoMarkdown = '';
            conversationHistory = [];
            saveChats();
            renderChatList();
            resetChatUI();
            updatePanelTitle();
            updateUrl(newId);
        }

        function switchToChat(chatId) {
            // Save current chat's state
            const currentChat = chats.find(c => c.id === currentSessionId);
            if (currentChat) {
                currentChat.todoMarkdown = todoMarkdown;
                saveChats();
            }

            // Switch to new chat
            currentSessionId = chatId;
            clearQuotedTask();
            const chat = chats.find(c => c.id === chatId);
            if (chat) {
                todoMarkdown = chat.todoMarkdown || '';
                conversationHistory = chat.messages || [];
                loadChatUI(chat);
                updateTodoDisplay();
                updateUrl(chatId);
            }
            renderChatList();
            updatePanelTitle();
        }

        function loadChatUI(chat) {
            messagesContainer.innerHTML = `
                <div class="message assistant">
                    Hey! Tell me what you need to get done and I'll organize it for you.
                </div>
            `;
            // Load saved messages
            if (chat.messages && chat.messages.length > 0) {
                chat.messages.forEach(msg => {
                    addMessage(msg.content, msg.role);
                });
            }
            updateTodoDisplay();
        }

        function resetChatUI() {
            messagesContainer.innerHTML = `
                <div class="message assistant">
                    Hey! Tell me what you need to get done and I'll organize it for you.
                </div>
            `;
            updateTodoDisplay();
        }

        function updateChatName(sessionId, message) {
            const chat = chats.find(c => c.id === sessionId);
            if (chat && chat.name.startsWith('Chat ')) {
                // Use first few words of first message as chat name
                chat.name = message.slice(0, 30) + (message.length > 30 ? '...' : '');
                saveChats();
                renderChatList();
                updatePanelTitle();
            }
        }

        function updatePanelTitle() {
            const chat = chats.find(c => c.id === currentSessionId);
            chatPanelTitle.textContent = chat ? chat.name : 'Chat';
        }

        function renderChatList() {
            chatList.innerHTML = chats.map(chat => `
                <div class="chat-item ${chat.id === currentSessionId ? 'active' : ''}"
                        data-chat-id="${chat.id}" title="${chat.name}">
                    <span class="chat-item-name">${chat.name}</span>
                    <button class="chat-item-menu-btn" data-chat-id="${chat.id}">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                            <circle cx="5" cy="12" r="2"></circle>
                            <circle cx="12" cy="12" r="2"></circle>
                            <circle cx="19" cy="12" r="2"></circle>
                        </svg>
                    </button>
                    <div class="chat-dropdown" data-dropdown-id="${chat.id}">
                        <button class="chat-dropdown-item" data-action="rename" data-chat-id="${chat.id}">Rename</button>
                        <button class="chat-dropdown-item danger" data-action="delete" data-chat-id="${chat.id}">Delete</button>
                    </div>
                </div>
            `).join('');

            // Add click handlers for chat selection
            chatList.querySelectorAll('.chat-item-name').forEach(item => {
                item.addEventListener('click', (e) => {
                    const chatId = e.target.closest('.chat-item').dataset.chatId;
                    switchToChat(chatId);
                });
            });

            // Add click handlers for menu buttons
            chatList.querySelectorAll('.chat-item-menu-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const chatId = btn.dataset.chatId;
                    toggleDropdown(chatId);
                });
            });

            // Add click handlers for dropdown items
            chatList.querySelectorAll('.chat-dropdown-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const action = item.dataset.action;
                    const chatId = item.dataset.chatId;
                    closeAllDropdowns();
                    if (action === 'rename') {
                        renameChat(chatId);
                    } else if (action === 'delete') {
                        deleteChat(chatId);
                    }
                });
            });
        }

        function toggleDropdown(chatId) {
            const dropdown = document.querySelector(`[data-dropdown-id="${chatId}"]`);
            const isOpen = dropdown.classList.contains('show');
            closeAllDropdowns();
            if (!isOpen) {
                dropdown.classList.add('show');
            }
        }

        function closeAllDropdowns() {
            document.querySelectorAll('.chat-dropdown').forEach(d => d.classList.remove('show'));
        }

        function renameChat(chatId) {
            const chat = chats.find(c => c.id === chatId);
            if (!chat) return;
            const newName = prompt('Rename chat:', chat.name);
            if (newName && newName.trim()) {
                chat.name = newName.trim();
                saveChats();
                renderChatList();
                updatePanelTitle();
            }
        }

        function deleteChat(chatId) {
            if (chats.length === 1) {
                alert('Cannot delete the only chat');
                return;
            }
            if (!confirm('Delete this chat?')) return;

            const index = chats.findIndex(c => c.id === chatId);
            if (index === -1) return;

            chats.splice(index, 1);
            saveChats();

            // If we deleted the current chat, switch to another
            if (chatId === currentSessionId) {
                switchToChat(chats[0].id);
            } else {
                renderChatList();
            }
        }

        // Close dropdowns when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.chat-item-menu-btn') && !e.target.closest('.chat-dropdown')) {
                closeAllDropdowns();
            }
        });

        function getSessionId() {
            return currentSessionId;
        }

        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message && !quotedTask) return;

            // Build the full message with optional quote
            let fullMessage = message;
            if (quotedTask) {
                fullMessage = `> ${quotedTask}\n\n${message}`;
            }

            // Add user message
            addMessage(fullMessage, 'user');
            clearQuotedTask();
            chatInput.value = '';
            chatInput.style.height = 'auto';
            sendBtn.classList.remove('active');

            // Disable input while processing
            chatInput.disabled = true;
            sendBtn.disabled = true;
            showTypingIndicator();

            // Add to conversation history and save
            conversationHistory.push({ role: 'user', content: fullMessage });
            const chat = chats.find(c => c.id === currentSessionId);
            if (chat) {
                chat.messages = conversationHistory;
                saveChats();
            }

            try {
                const response = await fetch(`${API_BASE}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        sessionId: getSessionId(),
                        message: fullMessage,
                        currentTasks: todoMarkdown || ''
                    })
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();

                hideTypingIndicator();

                if (data.model) {
                    modelBadge.textContent = formatModelName(data.model);
                }

                // Update todo list if response contains tasks
                if (data.todoMarkdown) {
                    todoMarkdown = data.todoMarkdown;
                    updateTodoDisplay();
                    // Save todo state to current chat
                    const chat = chats.find(c => c.id === currentSessionId);
                    if (chat) {
                        chat.todoMarkdown = todoMarkdown;
                        saveChats();
                    }
                }

                // Display chat message (server already strips task markdown)
                addMessage(data.message, 'assistant');

                conversationHistory.push({ role: 'assistant', content: data.message });

                // Save assistant message
                const chatToUpdate = chats.find(c => c.id === currentSessionId);
                if (chatToUpdate) {
                    chatToUpdate.messages = conversationHistory;
                    saveChats();
                }

                // Update chat name based on first message
                updateChatName(currentSessionId, message);

            } catch (error) {
                hideTypingIndicator();
                console.error('Error:', error);
                addMessage('Sorry, something went wrong. Please try again.', 'assistant');
            }

            chatInput.disabled = false;
            sendBtn.disabled = false;
            chatInput.focus();
        }

        // Sidebar toggle
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const mobileToggle = document.getElementById('mobileToggle');

        // Restore sidebar state
        if (localStorage.getItem('padtask-sidebar-expanded') === 'true') {
            sidebar.classList.add('expanded');
        }

        sidebarToggle.addEventListener('click', () => {
            sidebar.classList.toggle('expanded');
            localStorage.setItem('padtask-sidebar-expanded', sidebar.classList.contains('expanded'));
        });

        mobileToggle.addEventListener('click', () => {
            sidebar.classList.toggle('expanded');
            localStorage.setItem('padtask-sidebar-expanded', sidebar.classList.contains('expanded'));
        });

        // New chat button
        newChatBtn.addEventListener('click', createNewChat);

        // Handle browser back/forward navigation
        window.addEventListener('hashchange', () => {
            const chatId = getChatIdFromUrl();
            if (chatId && chatId !== currentSessionId && chats.find(c => c.id === chatId)) {
                switchToChat(chatId);
            }
        });

        // Initialize
        loadChats();
        updateTodoDisplay();
        updatePanelTitle();
    </script>
</body>
</html>
